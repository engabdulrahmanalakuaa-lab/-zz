name: Build & Release EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تنظيف cache وتثبيت الحزم
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          npm install --no-audit --no-fund --prefer-online

      - name: إعادة بناء الوحدات الأصلية
        run: npx electron-builder install-app-deps

      - name: بناء ملف EXE
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: رفع المثبت كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: تقنيات-سوفت-مطاعم-Installer
          path: dist/*.exe
